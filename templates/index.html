<!DOCTYPE html>
<html>
<head>
    <title>Smart Pill Box</title>
</head>
<body>
    <h1>Smart Pill Box</h1>

    <form method="POST">
        <label>Set Medicine Time:</label>
        <input type="time" name="time" required><br><br>

        <label>Enter Pill Stock:</label>
        <input type="number" name="stock" required><br><br>

        <button type="submit">Save</button>
    </form>

    {% if med %}
        <h3>Pills Remaining: {{ med.stock }}</h3>
        <a href="/taken">
            <button>✅ Mark as Taken</button>
        </a>
        <br><br>
        <a href="/progress">
            <button>📊 View Daily Progress</button>
        </a>
    {% endif %}
</body>
</html>
